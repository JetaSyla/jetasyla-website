<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeta Syla</title>
  <meta name="description" content="Jeta Syla — Executive Coordinator at Star Labs and Shkolla Digjitale" />

  <!-- Google Fonts: Playfair Display (serif) + Inter (sans-serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mint:     #b5ead7;
      --peach:    #ffdac1;
      --lavender: #c7ceea;
      --lemon:    #fffacd;
      --sky:      #aee6f5;
      --white:    #ffffff;
      --text-dark:   #2d2d3a;
      --text-mid:    #5a5a72;
      --text-light:  #8888a2;
      --glass-bg:    rgba(255, 255, 255, 0.55);
      --glass-border:rgba(255, 255, 255, 0.75);
      --shadow:   0 8px 40px rgba(100, 100, 160, 0.18);
      --radius:   20px;
      --btn-radius: 14px;
    }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      overflow-x: hidden;
      padding: 40px 16px;
      background-color: #e8eaf8;
    }

    /* ─── Animated Blob Background ────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.6;
      animation: drift 18s ease-in-out infinite alternate;
    }

    .blob-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--lavender), var(--sky));
      top: -120px; left: -100px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 440px; height: 440px;
      background: radial-gradient(circle, var(--peach), var(--lemon));
      bottom: -80px; right: -80px;
      animation-delay: -6s;
    }
    .blob-3 {
      width: 360px; height: 360px;
      background: radial-gradient(circle, var(--mint), var(--sky));
      top: 40%; left: 55%;
      animation-delay: -12s;
    }
    .blob-4 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, var(--lemon), var(--peach));
      top: 20%; left: 10%;
      animation-delay: -4s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      33%  { transform: translate(30px, -20px) scale(1.05); }
      66%  { transform: translate(-20px, 30px) scale(0.97); }
      100% { transform: translate(15px, 10px) scale(1.03); }
    }

    /* ─── Card ─────────────────────────────────────────────────────── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 48px 40px 40px;
      text-align: center;

      /* Fade-in on load */
      opacity: 0;
      transform: translateY(28px);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Avatar ────────────────────────────────────────────────────── */
    .avatar-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid var(--glass-border);
      box-shadow: 0 4px 20px rgba(160, 140, 200, 0.25);
      overflow: hidden;
      background: linear-gradient(135deg, var(--lavender), var(--mint));
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /*
      ╔══════════════════════════════════════════════════════════╗
      ║  PROFILE PHOTO — HOW TO SWAP IN A REAL IMAGE            ║
      ║                                                          ║
      ║  1. Add your photo file next to index.html, e.g.:       ║
      ║       photo.jpg                                          ║
      ║                                                          ║
      ║  2. Replace the <span class="monogram">JS</span>        ║
      ║     element inside .avatar with:                         ║
      ║       <img src="photo.jpg" alt="Jeta Syla"              ║
      ║            style="width:100%;height:100%;               ║
      ║                   object-fit:cover;" />                  ║
      ╚══════════════════════════════════════════════════════════╝
    */
    .monogram {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-mid);
      letter-spacing: 1px;
      user-select: none;
    }

    /* ─── Name & Title ──────────────────────────────────────────────── */
    .name {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: 0.02em;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .title {
      font-size: 0.875rem;
      font-weight: 400;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 6px;
    }

    .title strong {
      font-weight: 600;
      color: var(--text-dark);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, var(--lavender), var(--mint));
      border-radius: 2px;
      margin: 20px auto 28px;
    }

    /* ─── Link Buttons ──────────────────────────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: var(--btn-radius);
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      color: var(--text-dark);
      cursor: pointer;
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.22s ease,
        background 0.22s ease;
      text-align: left;
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 10px 28px rgba(140, 120, 200, 0.2);
      background: rgba(255, 255, 255, 0.8);
    }

    .link-btn:active {
      transform: translateY(0) scale(0.99);
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 1.15rem;
    }

    /* Per-button accent colors */
    .btn-linkedin .btn-icon  { background: linear-gradient(135deg, #c7ceea, #aee6f5); }
    .btn-email    .btn-icon  { background: linear-gradient(135deg, var(--peach), var(--lemon)); }
    .btn-starlabs .btn-icon  { background: linear-gradient(135deg, var(--mint), var(--sky)); }
    .btn-shkolla  .btn-icon  { background: linear-gradient(135deg, var(--lemon), var(--peach)); }
    .btn-booking  .btn-icon  { background: linear-gradient(135deg, #d8d4f0, #c7ceea); }

    .btn-text { display: flex; flex-direction: column; gap: 1px; flex: 1; }

    .btn-label {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.3;
    }

    .btn-sub {
      font-size: 0.75rem;
      font-weight: 400;
      color: var(--text-light);
      line-height: 1.3;
    }

    .btn-arrow {
      font-size: 0.85rem;
      color: var(--text-light);
      flex-shrink: 0;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link-btn:hover .btn-arrow {
      transform: translateX(3px);
      color: var(--text-mid);
    }

    /* ─── Footer ────────────────────────────────────────────────────── */
    .footer {
      margin-top: 32px;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    /* ─── Staggered button fade-in ──────────────────────────────────── */
    .link-btn {
      opacity: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .link-btn:nth-child(1) { animation-delay: 0.55s; }
    .link-btn:nth-child(2) { animation-delay: 0.70s; }
    .link-btn:nth-child(3) { animation-delay: 0.85s; }
    .link-btn:nth-child(4) { animation-delay: 1.00s; }
    .link-btn:nth-child(5) { animation-delay: 1.15s; }

    /* ─── Dark Mode Variables ───────────────────────────────────────── */
    body.dark {
      --glass-bg:    rgba(30, 28, 48, 0.65);
      --glass-border:rgba(255, 255, 255, 0.10);
      --shadow:      0 8px 40px rgba(0, 0, 0, 0.45);
      --text-dark:   #e8e6f4;
      --text-mid:    #a8a4c8;
      --text-light:  #6a6690;
      background-color: #13111f;
    }

    body.dark .blob-1 { background: radial-gradient(circle, #2a2060, #1a1540); opacity: 0.8; }
    body.dark .blob-2 { background: radial-gradient(circle, #1e1535, #2a1a45); opacity: 0.8; }
    body.dark .blob-3 { background: radial-gradient(circle, #0f1a30, #1a2040); opacity: 0.8; }
    body.dark .blob-4 { background: radial-gradient(circle, #251535, #1a1030); opacity: 0.8; }

    body.dark .link-btn {
      background: rgba(40, 36, 65, 0.60);
      border-color: rgba(255, 255, 255, 0.08);
    }
    body.dark .link-btn:hover {
      background: rgba(55, 50, 85, 0.80);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }

    body.dark .btn-linkedin .btn-icon { background: linear-gradient(135deg, #2e3568, #1e3055); }
    body.dark .btn-email    .btn-icon { background: linear-gradient(135deg, #4a2e22, #3a2a18); }
    body.dark .btn-starlabs .btn-icon { background: linear-gradient(135deg, #1a3d35, #152d38); }
    body.dark .btn-shkolla  .btn-icon { background: linear-gradient(135deg, #3a2e10, #3a2218); }
    body.dark .btn-booking  .btn-icon { background: linear-gradient(135deg, #2e2860, #252050); }

    body.dark .divider { background: linear-gradient(90deg, #3a3868, #1e3a30); }

    /* ─── Smooth global transition ──────────────────────────────────── */
    body, .card, .link-btn, .btn-icon, .blob, .divider {
      transition: background 0.4s ease, background-color 0.4s ease,
                  color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    /* ─── Toggle Button ─────────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 100;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 12px rgba(100, 100, 160, 0.15);
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
      padding: 0;
    }
    .theme-toggle:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 16px rgba(100, 100, 160, 0.25);
    }
    .theme-toggle:active { transform: scale(0.95); }

    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon { transition: opacity 0.3s ease, transform 0.3s ease; }

    /* Light mode: show sun, hide moon */
    .theme-toggle .icon-moon { position: absolute; opacity: 0; transform: rotate(30deg) scale(0.7); }
    .theme-toggle .icon-sun  { opacity: 1; transform: rotate(0deg) scale(1); }

    /* Dark mode: show moon, hide sun */
    body.dark .theme-toggle .icon-sun  { opacity: 0; transform: rotate(-30deg) scale(0.7); }
    body.dark .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }

    /* ─── Contact Form ──────────────────────────────────────────────── */
    .form-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(180, 160, 220, 0.35), transparent);
      margin: 24px 0;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-align: left;
    }

    .contact-form input,
    .contact-form textarea {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(180, 160, 220, 0.35);
      background: rgba(255, 255, 255, 0.45);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: var(--text-dark);
      outline: none;
      resize: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.4s ease;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder { color: var(--text-light); }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: rgba(180, 160, 220, 0.75);
      box-shadow: 0 0 0 3px rgba(199, 206, 234, 0.30);
      background: rgba(255, 255, 255, 0.70);
    }

    .contact-form textarea { height: 96px; }

    .btn-submit {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 18px;
      border-radius: var(--btn-radius);
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.55);
      color: var(--text-dark);
      cursor: pointer;
      width: 100%;
      text-align: left;
      font-family: 'Inter', sans-serif;
      transition:
        transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow 0.22s ease,
        background 0.22s ease;
    }
    .btn-submit:hover {
      transform: translateY(-3px) scale(1.015);
      box-shadow: 0 10px 28px rgba(140, 120, 200, 0.2);
      background: rgba(255, 255, 255, 0.8);
    }
    .btn-submit:active { transform: translateY(0) scale(0.99); }
    .btn-submit .btn-icon { background: linear-gradient(135deg, var(--mint), var(--lavender)); }
    .btn-submit .btn-label { font-size: 0.875rem; font-weight: 600; color: var(--text-dark); }
    .btn-submit .btn-arrow {
      margin-left: auto;
      font-size: 0.85rem;
      color: var(--text-light);
      transition: transform 0.2s ease, color 0.2s ease;
    }
    .btn-submit:hover .btn-arrow { transform: translateX(3px); color: var(--text-mid); }

    .form-success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 18px;
      border-radius: 12px;
      background: rgba(181, 234, 215, 0.35);
      border: 1px solid rgba(181, 234, 215, 0.6);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-mid);
      animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .form-success.visible { display: flex; }

    /* Dark mode — form */
    body.dark .contact-form input,
    body.dark .contact-form textarea {
      background: rgba(30, 26, 55, 0.55);
      border-color: rgba(255, 255, 255, 0.10);
      color: var(--text-dark);
    }
    body.dark .contact-form input:focus,
    body.dark .contact-form textarea:focus {
      border-color: rgba(160, 144, 224, 0.45);
      box-shadow: 0 0 0 3px rgba(100, 90, 180, 0.18);
      background: rgba(40, 35, 70, 0.70);
    }
    body.dark .btn-submit {
      background: rgba(40, 36, 65, 0.60);
      border-color: rgba(255, 255, 255, 0.08);
    }
    body.dark .btn-submit:hover {
      background: rgba(55, 50, 85, 0.80);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
    }
    body.dark .btn-submit .btn-icon { background: linear-gradient(135deg, #1a3d35, #2e2860); }
    body.dark .form-success {
      background: rgba(20, 50, 40, 0.45);
      border-color: rgba(80, 160, 120, 0.30);
    }
    body.dark .form-divider {
      background: linear-gradient(90deg, transparent, rgba(100, 90, 160, 0.25), transparent);
    }

    /* ─── Mobile ────────────────────────────────────────────────────── */
    @media (max-width: 520px) {
      .card { padding: 36px 24px 32px; }
      .name { font-size: 1.7rem; }
    }
  </style>
</head>
<body>

  <!-- Dark mode toggle -->
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <!-- Sun icon (light mode) -->
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
         fill="none" stroke="#b07030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2"  x2="12" y2="4"/>

    <!-- Moon icon (dark mode) -->
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"

      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>

  <!-- Pastel blob background -->
  <div class="bg" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="blob blob-4"></div>

  <!-- Main card -->
  <main class="card" role="main">

    <!-- Profile photo / monogram -->
    <div class="avatar-wrap">
      <div class="avatar">
        <img src="photo.jpg" alt="Jeta Syla"
             style="width:100%;height:100%;object-fit:cover;" />
      </div>
    </div>

    <!-- Name -->
    <h1 class="name">Jeta Syla</h1>

    <!-- Title / roles -->
    <p class="title">
      Executive Coordinator<br />
      <strong>Star Labs</strong> &amp; <strong>Shkolla Digjitale</strong>
    </p>

    <div class="divider"></div>

    <!-- Link buttons -->
    <nav class="links" aria-label="Links">

      <!-- ── LinkedIn ─────────────────────────────────────────────── -->
      <a href="https://www.linkedin.com/in/jeta-syla-0a001a288/" target="_blank" rel="noopener noreferrer"
         class="link-btn btn-linkedin"
         aria-label="LinkedIn profile">
        <span class="btn-icon">
          <!-- LinkedIn icon (SVG) -->

        <span class="btn-text">
          <span class="btn-label">LinkedIn</span>
          <span class="btn-sub">Connect with me</span>
        </span>
        <span class="btn-arrow" aria-hidden="true">→</span>
      </a>

      <!-- ── Email ────────────────────────────────────────────────── -->
      <a href="mailto:jeta.syla@starlabspro.com"
         class="link-btn btn-email"
         aria-label="Send email">
        <span class="btn-icon">
          <!-- Envelope icon (SVG) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#b07050" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect width="20" height="16" x="2" y="4" rx="2"/>

        <span class="btn-text">

      <!-- ── Star Labs LLC ─────────────────────────────────────────── -->
      <a href="https://starlabs.dev/" target="_blank" rel="noopener noreferrer"
         class="link-btn btn-starlabs"
         aria-label="Star Labs LLC website">
        <span class="btn-icon">
          <!-- Star icon (SVG) -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3a8a7a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </span>
        <span class="btn-text">
          <span class="btn-label">Star Labs LLC</span>
          <span class="btn-sub">Where I work</span>
        </span>

  <script>
    (function () {
      const toggle = document.getElementById('themeToggle');
      const body   = document.body;

      // Determine initial mode: localStorage → system preference → light
      function getPreferred() {
        const saved = localStorage.getItem('theme');
        if (saved) return saved;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function applyTheme(mode) {
        if (mode === 'dark') {
          body.classList.add('dark');
        } else {
          body.classList.remove('dark');
        }
        toggle.setAttribute('aria-label', mode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
      }

      // Apply on load (before paint to avoid flash)
      applyTheme(getPreferred());

      toggle.addEventListener('click', function () {
        const isDark = body.classList.contains('dark');
        const next   = isDark ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        applyTheme(next);
      });

      // ── Contact form ──────────────────────────────────────────────
      const form    = document.getElementById('contactForm');
      const success = document.getElementById('formSuccess');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        // Hide any previous success message before re-showing
        success.classList.remove('visible');

        // Basic validation — all fields required
        const fields = form.querySelectorAll('input, textarea');
        let valid = true;
        fields.forEach(function (f) { if (!f.value.trim()) valid = false; });
        if (!valid) return;

        // TODO: replace this block with your actual send logic (see comment above the form)
        // e.g. fetch('/your-endpoint', { method: 'POST', body: new FormData(form) })

        // Show success message and reset form
        form.reset();
        success.classList.add('visible');
      });
    })();
  </script>
